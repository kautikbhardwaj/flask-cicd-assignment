name: Flask CI/CD

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    name: Install Dependencies and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build:
    name: Build Application Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' -czf dist/flask-practice.tar.gz .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-practice-package
          path: dist/flask-practice.tar.gz

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-practice-package
          path: dist

      - name: Deploy package to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PATH: ${{ secrets.STAGING_PATH }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          if [ -n "$STAGING_HOST" ] && [ -n "$STAGING_USER" ] && [ -n "$STAGING_PATH" ] && [ -n "$STAGING_SSH_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$STAGING_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no dist/flask-practice.tar.gz "$STAGING_USER@$STAGING_HOST:$STAGING_PATH/flask-practice.tar.gz"
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" "cd '$STAGING_PATH' && tar -xzf flask-practice.tar.gz && touch .deployed"
          else
            mkdir -p staging-deploy
            cp dist/flask-practice.tar.gz staging-deploy/
            echo "Staging secrets are not configured. Created a local staging deployment package for this workflow run."
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-practice-package
          path: dist

      - name: Deploy package to production
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          if [ -n "$PRODUCTION_HOST" ] && [ -n "$PRODUCTION_USER" ] && [ -n "$PRODUCTION_PATH" ] && [ -n "$PRODUCTION_SSH_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$PRODUCTION_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no dist/flask-practice.tar.gz "$PRODUCTION_USER@$PRODUCTION_HOST:$PRODUCTION_PATH/flask-practice.tar.gz"
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$PRODUCTION_USER@$PRODUCTION_HOST" "cd '$PRODUCTION_PATH' && tar -xzf flask-practice.tar.gz && touch .deployed"
          else
            mkdir -p production-deploy
            cp dist/flask-practice.tar.gz production-deploy/
            echo "Production secrets are not configured. Created a local production deployment package for this workflow run."
          fi
